<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LL Nástěnka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#E85520; --brown:#3B1A0D; --olive:#6B7A50; --cream:#F0E8D6;
    --paper:#FCF8EF; --ink:#2A1508; --muted:#9c876c; --line:#E4D8C2;
    --hr:#6B7A50; --vyroba:#E85520; --vedeni:#3B1A0D;
    --marketing:#B8894A; --provoz:#5E7B8B; --ostatni:#8A8A7A;
    --fs:1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--ink);
    height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(circle at 18% 20%, rgba(232,85,32,.06), transparent 40%),
      radial-gradient(circle at 82% 78%, rgba(107,122,80,.07), transparent 42%),
      #EDE3CE;
  }

  /* ---- header ---- */
  header{display:flex;align-items:center;justify-content:space-between;
    padding:1.5vh 2.4vw .9vh;flex:none}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(22px,2.6vw,42px);
    color:var(--brown);letter-spacing:-.5px;line-height:1}
  .brand span{color:var(--orange)}
  .brand small{display:block;font-family:'Plus Jakarta Sans';font-weight:700;
    font-size:clamp(10px,.85vw,15px);color:var(--olive);letter-spacing:3px;
    text-transform:uppercase;margin-top:.5vh}
  .clock{text-align:right;line-height:1}
  .time{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,2.8vw,46px);color:var(--brown)}
  .date{font-size:clamp(11px,1vw,18px);color:var(--olive);font-weight:600;text-transform:capitalize;margin-top:.4vh}

  /* ---- stage: sidebar + feature ---- */
  .stage{flex:1;display:flex;gap:1.4vw;min-height:0;padding:0 2vw 2vh}

  /* pin-board texture helper */
  .board-tex{
    background-image:radial-gradient(rgba(59,26,13,.05) 1.5px, transparent 1.6px);
    background-size:26px 26px;
  }

  /* ---- sidebar (list of little notes) ---- */
  .sidebar{width:33%;min-width:0;display:flex;flex-direction:column;gap:1.1vh;
    overflow-y:auto;padding:.6vh .4vw .6vh .2vw;scrollbar-width:none}
  .sidebar::-webkit-scrollbar{display:none}
  .slabel{font-family:'Plus Jakarta Sans';font-weight:800;font-size:clamp(11px,1vw,16px);
    letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:.2vh 0 .2vh .4vw;flex:none}

  .mini{
    position:relative;background:var(--paper);border-radius:12px;padding:1.3vh 1.1vw 1.3vh 1.3vw;
    border:1px solid var(--line);box-shadow:0 3px 12px rgba(59,26,13,.08);
    border-left:7px solid var(--c);flex:none;transition:transform .35s cubic-bezier(.2,.9,.3,1.2),box-shadow .35s,opacity .35s;
    opacity:.72;transform:rotate(var(--tilt,0deg));
  }
  .mini .mtop{display:flex;align-items:center;gap:.5vw;margin-bottom:.5vh}
  .mini .mdot{width:.75vw;height:.75vw;max-width:11px;max-height:11px;border-radius:50%;background:var(--c);flex:none}
  .mini .mdept{font-weight:800;font-size:clamp(9px,.75vw,13px);letter-spacing:1px;text-transform:uppercase;color:var(--c)}
  .mini .mprio{margin-left:auto;font-size:clamp(9px,.7vw,12px);font-weight:800;color:var(--orange);letter-spacing:.5px}
  .mini h3{font-family:'Fraunces',serif;font-weight:600;color:var(--brown);
    font-size:clamp(14px,1.15vw,24px);line-height:1.15;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .mini.active{opacity:1;transform:rotate(0deg) scale(1.04);box-shadow:0 10px 26px rgba(59,26,13,.18);border-color:var(--c)}
  .mini.active:before{content:"";position:absolute;left:-7px;top:0;bottom:0;width:7px;background:var(--c)}

  /* ---- feature (big rotating note) ---- */
  .feature{flex:1;min-width:0;position:relative;display:flex}
  .fcard{
    position:absolute;inset:0;background:var(--paper);border-radius:22px;
    border:1px solid var(--line);box-shadow:0 14px 44px rgba(59,26,13,.14);
    padding:5vh 4vw 4vh;display:flex;flex-direction:column;overflow:hidden;
  }
  .fcard:before{content:"";position:absolute;left:0;top:0;bottom:0;width:14px;background:var(--c)}
  /* pushpin */
  .fpin{position:absolute;top:2.4vh;left:50%;transform:translateX(-50%);
    width:2.4vw;height:2.4vw;max-width:34px;max-height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff6, var(--c));
    box-shadow:0 3px 8px rgba(0,0,0,.28)}
  .fcard.enter{animation:slidein .6s cubic-bezier(.2,.85,.3,1) both}
  @keyframes slidein{from{opacity:0;transform:translateX(5%) scale(.98)}to{opacity:1;transform:none}}

  .ftab{align-self:flex-start;background:var(--c);color:#fff;font-weight:800;
    font-size:calc(var(--fs) * clamp(16px,1.5vw,28px));text-transform:uppercase;letter-spacing:1.5px;
    padding:.7vh 1.4vw;border-radius:10px;margin-bottom:2vh}
  .fphoto{width:100%;max-height:38%;object-fit:cover;border-radius:14px;margin-bottom:2.4vh;flex:none;
    box-shadow:0 6px 18px rgba(59,26,13,.14)}
  .ftitle{font-family:'Fraunces',serif;font-weight:600;color:var(--brown);
    font-size:calc(var(--fs) * clamp(38px,4.6vw,104px));line-height:1.04;margin-bottom:2vh;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .fbody{font-family:'Plus Jakarta Sans';font-weight:500;color:#4a3a2c;white-space:pre-wrap;
    font-size:calc(var(--fs) * clamp(22px,2.4vw,46px));line-height:1.36;flex:1;overflow:hidden;
    display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical}
  .ffoot{display:flex;justify-content:space-between;align-items:baseline;gap:2vw;
    margin-top:2.2vh;padding-top:1.6vh;border-top:2px solid var(--line);
    font-size:calc(var(--fs) * clamp(16px,1.4vw,28px));color:var(--muted);font-weight:700}
  .ffoot .fauth{color:var(--brown)}
  .fcard.high{border:3px solid var(--orange)}
  .fcard.high .fribbon{position:absolute;top:2.6vh;right:-4vw;background:var(--orange);color:#fff;
    font-weight:800;font-size:clamp(12px,1vw,18px);letter-spacing:2px;padding:.5vh 4.5vw;transform:rotate(40deg)}
  .fprog{position:absolute;left:0;bottom:0;height:7px;background:var(--orange);width:0}

  /* ---- controls / states ---- */
  .center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;text-align:center;padding:6vw}
  .center h1{font-family:'Fraunces',serif;font-size:clamp(28px,3vw,54px);color:var(--brown);margin-bottom:2vh}
  .center p{font-size:clamp(15px,1.4vw,26px);color:var(--olive);max-width:60ch}
  .setupbox{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:4vh 4vw;max-width:640px;margin-top:2vh}
  .setupbox label{display:block;text-align:left;font-weight:600;color:var(--brown);margin:2vh 0 .6vh;font-size:16px}
  .setupbox input{width:100%;font:inherit;font-size:16px;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff}
  .setupbox button{margin-top:2.4vh;font:inherit;font-weight:600;font-size:16px;background:var(--orange);color:#fff;border:none;border-radius:10px;padding:13px 26px;cursor:pointer}
  .hint{font-size:13px;color:var(--muted);margin-top:.6vh;text-align:left}

  .ctrlbar{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:30;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
    background:rgba(59,26,13,.93);color:#fff;padding:10px 16px;border-radius:14px;
    font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,.25);max-width:94vw}
  .ctrlbar span{opacity:.85;font-weight:600;font-size:13px}
  .ctrlbar button{font:inherit;font-weight:700;font-size:15px;cursor:pointer;border:none;
    background:rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:7px 12px;min-width:40px}
  .ctrlbar button:hover{background:rgba(255,255,255,.30)}
  .ctrlbar button.on{background:var(--orange)}
  .ctrlbar .sep{width:1px;height:22px;background:rgba(255,255,255,.25)}
  .gear{position:fixed;bottom:10px;right:12px;opacity:.12;font-size:20px;cursor:pointer;z-index:20}
  .gear:hover{opacity:.5}
  .hidden{display:none!important}
</style>
</head>
<body>
  <header>
    <div class="brand">Libeřské <span>lahůdky</span><small>Nástěnka pro tým</small></div>
    <div class="clock"><div class="time" id="time">–:–</div><div class="date" id="date"></div></div>
  </header>

  <div class="stage" id="stage">
    <aside class="sidebar" id="sidebar"></aside>
    <section class="feature board-tex" id="feature"></section>
  </div>

  <div class="center hidden" id="emptyState">
    <h1>🌿 Nástěnka je čistá</h1>
    <p>Aktuálně tu nejsou žádné vzkazy. Jakmile něco vyvěsí HR nebo výroba, objeví se to tady.</p>
  </div>

  <div class="center hidden" id="setupState">
    <div class="brand">Libeřské <span>lahůdky</span></div>
    <div class="setupbox">
      <h1 style="font-family:'Fraunces';color:var(--brown);font-size:26px">Nastavení televize</h1>
      <label>Adresa serveru (API)</label>
      <input type="text" id="rawUrlInput" placeholder="https://ll-nastenka.…workers.dev">
      <div class="hint">Obvykle se bere z config.json a nemusíš nic zadávat.</div>
      <button id="saveSetup">Uložit a spustit</button>
    </div>
  </div>

  <div class="ctrlbar hidden" id="ctrlBar">
    <span>Písmo</span>
    <button data-fs="down">A−</button><button data-fs="up">A+</button>
    <div class="sep"></div>
    <span>Rychlost střídání</span>
    <button data-sp="slow">Pomalu</button><button data-sp="med">Střed</button><button data-sp="fast">Rychle</button>
    <div class="sep"></div>
    <button id="ctrlClose">Hotovo</button>
  </div>
  <div class="gear" id="gear" title="Nastavení">⚙</div>

<script>
(function(){
  "use strict";
  var LS="ll_nastenka_tv_url";
  var LS_VIEW="ll_nastenka_tv_view2";
  var REFRESH_MS=60000;
  var SPEEDS={slow:13000, med:9000, fast:5500};

  var DEPTS={
    HR:{label:"HR",color:"#6B7A50"}, VYROBA:{label:"Výroba",color:"#E85520"},
    VEDENI:{label:"Vedení",color:"#3B1A0D"}, MARKETING:{label:"Marketing",color:"#B8894A"},
    PROVOZ:{label:"Provoz",color:"#5E7B8B"}, OSTATNI:{label:"Vzkaz",color:"#8A8A7A"}
  };

  var $=function(id){return document.getElementById(id);};
  var rawUrl=localStorage.getItem(LS)||"";
  var messages=[], featIdx=0, rotTimer=null;

  function loadView(){ var v; try{v=JSON.parse(localStorage.getItem(LS_VIEW))||{};}catch(e){v={};}
    return {fs:v.fs||1, speed:v.speed||"med"}; }
  var VIEW=loadView();
  function saveView(){ localStorage.setItem(LS_VIEW,JSON.stringify(VIEW)); }
  function applyFs(){ document.documentElement.style.setProperty('--fs',VIEW.fs); }
  function markSp(){ var b=document.querySelectorAll('#ctrlBar [data-sp]'); for(var i=0;i<b.length;i++){ b[i].className=(b[i].getAttribute('data-sp')===VIEW.speed)?'on':''; } }
  applyFs();

  // ---- clock ----
  var DNI=["Neděle","Pondělí","Úterý","Středa","Čtvrtek","Pátek","Sobota"];
  var MES=["ledna","února","března","dubna","května","června","července","srpna","září","října","listopadu","prosince"];
  function tick(){ var d=new Date(),h=d.getHours(),m=d.getMinutes();
    $("time").textContent=h+":"+(m<10?"0"+m:m);
    $("date").textContent=DNI[d.getDay()]+" "+d.getDate()+". "+MES[d.getMonth()]; }
  tick(); setInterval(tick,10000);

  // ---- setup ----
  function showSetup(){ $("stage").classList.add("hidden"); $("emptyState").classList.add("hidden"); $("setupState").classList.remove("hidden"); if(rawUrl)$("rawUrlInput").value=rawUrl; }
  function hideSetup(){ $("setupState").classList.add("hidden"); $("stage").classList.remove("hidden"); }
  $("gear").onclick=function(){ if(!rawUrl) showSetup(); else $("ctrlBar").classList.toggle("hidden"); };
  $("ctrlClose").onclick=function(){ $("ctrlBar").classList.add("hidden"); };
  $("saveSetup").onclick=function(){ var v=$("rawUrlInput").value.trim(); if(!v)return; rawUrl=v; localStorage.setItem(LS,v); hideSetup(); loadData(); };

  (function(){
    var fsb=document.querySelectorAll('#ctrlBar [data-fs]');
    for(var i=0;i<fsb.length;i++){ (function(btn){ btn.onclick=function(){
      var dir=btn.getAttribute('data-fs');
      VIEW.fs=Math.max(0.7,Math.min(2.2, VIEW.fs+(dir==='up'?0.12:-0.12)));
      VIEW.fs=Math.round(VIEW.fs*100)/100; saveView(); applyFs();
    };})(fsb[i]); }
    var spb=document.querySelectorAll('#ctrlBar [data-sp]');
    for(var j=0;j<spb.length;j++){ (function(btn){ btn.onclick=function(){
      VIEW.speed=btn.getAttribute('data-sp'); saveView(); markSp(); startRotate();
    };})(spb[j]); }
  })();
  markSp();

  // ---- config + data ----
  fetch('./config.json?t='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(c){ rawUrl=(c&&c.api)||rawUrl; startTV(); })
    .catch(function(){ startTV(); });
  function startTV(){ if(!rawUrl){ showSetup(); } else { loadData(); } }

  function loadData(){
    if(!rawUrl) return;
    var url=rawUrl+(rawUrl.indexOf("?")>=0?"&":"?")+"t="+Date.now();
    fetch(url,{cache:'no-store'})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(d){ messages=filterActive((d&&d.messages)?d.messages:[]); onData(); })
      .catch(function(){});
  }
  setInterval(loadData, REFRESH_MS);

  function filterActive(list){
    var now=new Date();
    return list.filter(function(m){ if(!m.validUntil) return true; return new Date(m.validUntil+"T23:59:59")>=now; })
      .sort(function(a,b){ var ap=a.priority==="high"?1:0,bp=b.priority==="high"?1:0;
        if(ap!==bp) return bp-ap; return new Date(b.created)-new Date(a.created); });
  }

  function imgUrl(m){ return rawUrl+(rawUrl.indexOf("?")>=0?"&":"?")+"img="+m.img+"&v="+encodeURIComponent(m.created); }
  function fmt(iso){ try{return new Date(iso).toLocaleDateString("cs-CZ",{day:"numeric",month:"numeric"});}catch(e){return "";} }

  function onData(){
    if(!messages.length){
      $("stage").classList.add("hidden"); $("emptyState").classList.remove("hidden");
      if(rotTimer){clearInterval(rotTimer);rotTimer=null;} return;
    }
    $("emptyState").classList.add("hidden"); $("stage").classList.remove("hidden");
    if(featIdx>=messages.length) featIdx=0;
    buildSidebar();
    renderFeature(false);
    startRotate();
  }

  function buildSidebar(){
    var sb=$("sidebar"); sb.innerHTML="";
    var lab=document.createElement("div"); lab.className="slabel";
    lab.textContent="Vzkazy · "+messages.length; sb.appendChild(lab);
    messages.forEach(function(m,i){
      var d=DEPTS[m.dept]||DEPTS.OSTATNI;
      var el=document.createElement("div");
      el.className="mini"+(i===featIdx?" active":"");
      el.style.setProperty("--c", d.color);
      el.style.setProperty("--tilt", (i%2===0?"-1deg":"0.8deg"));
      el.innerHTML='<div class="mtop"><span class="mdot"></span><span class="mdept">'+d.label+'</span>'+
        (m.priority==="high"?'<span class="mprio">● DŮLEŽITÉ</span>':'')+'</div><h3></h3>';
      el.querySelector("h3").textContent=m.title||"";
      el.onclick=function(){ featIdx=i; renderFeature(true); updateActive(); startRotate(); };
      sb.appendChild(el);
    });
  }

  function updateActive(){
    var minis=$("sidebar").querySelectorAll(".mini");
    for(var i=0;i<minis.length;i++){ minis[i].className="mini"+(i===featIdx?" active":""); }
    var act=minis[featIdx];
    if(act && act.scrollIntoView){ try{ act.scrollIntoView({block:"center",behavior:"smooth"}); }catch(e){ act.scrollIntoView(); } }
  }

  function renderFeature(animate){
    var m=messages[featIdx]; if(!m) return;
    var d=DEPTS[m.dept]||DEPTS.OSTATNI;
    var f=$("feature");
    var multi=messages.length>1;
    var html='<div class="fcard'+(animate?" enter":"")+(m.priority==="high"?" high":"")+'" style="--c:'+d.color+'">'+
      '<div class="fpin"></div>'+
      (m.priority==="high"?'<div class="fribbon">DŮLEŽITÉ</div>':'')+
      (m.img?'<img class="fphoto" src="'+imgUrl(m)+'">':'')+
      '<span class="ftab">'+d.label+'</span>'+
      '<div class="ftitle"></div>'+
      '<div class="fbody"></div>'+
      '<div class="ffoot"><span class="fauth"></span><span class="fdate"></span></div>'+
      (multi?'<div class="fprog" id="fprog"></div>':'')+
    '</div>';
    f.innerHTML=html;
    f.querySelector(".ftitle").textContent=m.title||"";
    f.querySelector(".fbody").textContent=m.body||"";
    f.querySelector(".fauth").textContent=m.author?("— "+m.author):"";
    f.querySelector(".fdate").textContent=(m.validUntil?("platí do "+fmt(m.validUntil+"T00:00:00")):("vyvěšeno "+fmt(m.created)));
    startProgress();
  }

  function startProgress(){
    var p=$("fprog"); if(!p) return;
    var ms=SPEEDS[VIEW.speed]||SPEEDS.med;
    p.style.transition="none"; p.style.width="0";
    void p.offsetWidth;
    p.style.transition="width "+ms+"ms linear"; p.style.width="100%";
  }

  function startRotate(){
    if(rotTimer){ clearInterval(rotTimer); rotTimer=null; }
    if(messages.length<=1){ return; }
    var ms=SPEEDS[VIEW.speed]||SPEEDS.med;
    rotTimer=setInterval(function(){
      featIdx=(featIdx+1)%messages.length;
      renderFeature(true); updateActive();
    }, ms);
  }

  document.addEventListener("keydown",function(e){
    if(e.key==="s"||e.key==="S") showSetup();
    if(e.key==="Escape"){ hideSetup(); $("ctrlBar").classList.add("hidden"); }
    if(messages.length>1){
      if(e.key==="ArrowRight"){ featIdx=(featIdx+1)%messages.length; renderFeature(true); updateActive(); startRotate(); }
      if(e.key==="ArrowLeft"){ featIdx=(featIdx-1+messages.length)%messages.length; renderFeature(true); updateActive(); startRotate(); }
    }
  });
})();
</script>
</body>
</html>
