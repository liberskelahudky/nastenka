name: Deploy Worker
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@latest deploy | tee deploy.log
          URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.workers\.dev' deploy.log | head -1)
          echo "$URL" > ../worker-url.txt
          echo "WORKER URL = $URL"
      - name: Record URL back to repo
        run: |
          git config user.name "deploy-bot"
          git config user.email "deploy@users.noreply.github.com"
          git add worker-url.txt
          git commit -m "record worker url [skip ci]" || echo "nothing to commit"
          git push
