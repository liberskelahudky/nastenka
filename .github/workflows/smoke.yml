name: Smoke Test
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: test worker
        run: |
          U=https://ll-nastenka.literova.workers.dev
          K=LL-nastenka-8Kq3Zx7m
          {
            echo "== GET (prazdno) =="; curl -s "$U"; echo
            echo "== POST add =="; curl -s -X POST "$U" -H "Content-Type: application/json" \
              -d "{\"action\":\"add\",\"key\":\"$K\",\"msg\":{\"id\":\"smoketest\",\"dept\":\"HR\",\"author\":\"CI\",\"title\":\"Test\",\"body\":\"ok\",\"priority\":\"normal\",\"validUntil\":\"\",\"created\":\"2026-07-03T10:00:00.000Z\"}}"; echo
            echo "== GET (s vzkazem) =="; curl -s "$U"; echo
            echo "== POST delete =="; curl -s -X POST "$U" -H "Content-Type: application/json" \
              -d "{\"action\":\"delete\",\"key\":\"$K\",\"id\":\"smoketest\"}"; echo
            echo "== POST spatny klic (ma vratit 401) =="; curl -s -o /dev/null -w "HTTP %{http_code}" -X POST "$U" -H "Content-Type: application/json" -d "{\"action\":\"add\",\"key\":\"WRONG\",\"msg\":{\"id\":\"x\"}}"; echo
          } > smoke-result.txt 2>&1
      - name: commit
        if: always()
        run: |
          git config user.name deploy-bot
          git config user.email deploy@users.noreply.github.com
          git add smoke-result.txt
          git commit -m "smoke test [skip ci]" || echo nothing
          git push
