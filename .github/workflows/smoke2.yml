name: Smoke Image
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: test image path
        run: |
          U=https://ll-nastenka.literova.workers.dev
          K=LL-nastenka-8Kq3Zx7m
          {
            echo "== add with image =="
            curl -s -X POST "$U" -H "Content-Type: application/json" \
              -d "{\"action\":\"add\",\"key\":\"$K\",\"image\":\"data:image/jpeg;base64,SGVsbG9JbWFnZQ==\",\"msg\":{\"id\":\"imgtest\",\"dept\":\"HR\",\"author\":\"CI\",\"title\":\"Foto test\",\"body\":\"x\",\"priority\":\"normal\",\"validUntil\":\"\",\"created\":\"2026-07-03T10:00:00.000Z\"}}"; echo
            echo "== list (ma mit img=imgtest) =="; curl -s "$U"; echo
            echo "== GET image (ma byt 200 image/jpeg) =="
            curl -s -o /tmp/i.bin -w "HTTP %{http_code} type=%{content_type} size=%{size_download}" "$U?img=imgtest"; echo
            echo "== delete =="; curl -s -X POST "$U" -H "Content-Type: application/json" -d "{\"action\":\"delete\",\"key\":\"$K\",\"id\":\"imgtest\"}"; echo
            echo "== GET image po smazani (ma byt 404) =="
            curl -s -o /dev/null -w "HTTP %{http_code}" "$U?img=imgtest"; echo
          } > smoke2-result.txt 2>&1
      - name: commit
        if: always()
        run: |
          git config user.name deploy-bot
          git config user.email deploy@users.noreply.github.com
          git add smoke2-result.txt
          git commit -m "smoke image [skip ci]" || echo nothing
          git push
